<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKFLIX Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F5F5F7; --card: #FFFFFF; --text: #1D1D1F; 
            --accent: #0066CC; --border: #D2D2D7;
        }
        .dark {
            --bg: #0f0f10; --card: #1c1c1e; --text: #ffffff; 
            --accent: #0A84FF; --border: #333;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s; padding: 20px; }
        
        .container { max-width: 1000px; margin: auto; }
        header { text-align: center; padding: 40px 0; }
        
        /* Search Bar */
        .search-container { position: relative; max-width: 600px; margin: 0 auto 40px; }
        #search { width: 100%; padding: 16px 20px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 16px; outline: none; }
        
        /* Panel */
        .panel { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 40px; }
        .form { display: grid; grid-template-columns: 2fr 2fr 1fr auto; gap: 10px; }
        
        /* Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); transition: 0.2s; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card h3 { font-size: 16px; margin-bottom: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card a { display: block; background: var(--accent); color: white; text-align: center; padding: 8px; border-radius: 8px; text-decoration: none; font-size: 14px; }
        
        .delete { position: absolute; top: 10px; right: 10px; background: none; border: none; cursor: pointer; color: #ff3b30; opacity: 0.6; }
        .delete:hover { opacity: 1; }

        @media(max-width:600px) { .form { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>DARKFLIX</h1>
        <button id="themeBtn" style="margin-top:10px; padding:8px 16px; border-radius:8px; border:none; cursor:pointer;">Toggle Theme</button>
    </header>

    <div class="search-container">
        <input id="search" placeholder="Search your library...">
    </div>

    <div class="panel">
        <div class="form">
            <input id="name" placeholder="Name">
            <input id="url" placeholder="URL (e.g., https://site.com)">
            <select id="category">
                <option>Movies</option><option>Anime</option><option>Gaming</option><option>Tools</option><option>Social</option>
            </select>
            <button onclick="addLink()" style="background:var(--accent); color:white; border:none; padding:0 20px; border-radius:12px; cursor:pointer;">Add</button>
        </div>
    </div>

    <div id="content"></div>
</div>

<script>
    let links = JSON.parse(localStorage.getItem("darkflix_links")) || [];
    const themeBtn = document.getElementById("themeBtn");

    // Theme logic
    if(localStorage.getItem("theme") === "dark") document.body.classList.add("dark");
    themeBtn.onclick = () => {
        document.body.classList.toggle("dark");
        localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
    };

    function addLink() {
        const name = document.getElementById("name").value;
        let url = document.getElementById("url").value;
        const category = document.getElementById("category").value;
        
        if(!name || !url) return alert("Please fill all fields");
        if(!url.startsWith('http')) url = 'https://' + url;
        
        links.push({ name, url, category });
        localStorage.setItem("darkflix_links", JSON.stringify(links));
        render();
    }

    function removeLink(index) {
        links.splice(index, 1);
        localStorage.setItem("darkflix_links", JSON.stringify(links));
        render();
    }

    function render() {
        const content = document.getElementById("content");
        const query = document.getElementById("search").value.toLowerCase();
        content.innerHTML = "";
        
        const categories = ["Movies","Anime","Gaming","Tools","Social"];
        categories.forEach(cat => {
            const filtered = links.filter(l => l.category === cat && l.name.toLowerCase().includes(query));
            if(filtered.length === 0) return;

            content.innerHTML += `
                <h2 style="margin: 30px 0 15px;">${cat}</h2>
                <div class="grid">
                    ${filtered.map((item, i) => `
                        <div class="card">
                            <button class="delete" onclick="removeLink(${links.indexOf(item)})">✕</button>
                            <h3>${item.name}</h3>
                            <a href="${item.url}" target="_blank">Open</a>
                        </div>
                    `).join("")}
                </div>
            `;
        });
    }

    document.getElementById("search").addEventListener("input", render);
    render();
</script>
</body>
</html>
