<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DARKFLIX Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#F5F5F7;
--card:#FFFFFF;
--text:#1D1D1F;
--accent:#0066CC;
--border:#D2D2D7;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

header{
text-align:center;
padding:60px 20px;
}

h1{
font-family:'Hanken Grotesk',sans-serif;
font-size:56px;
font-weight:700;
letter-spacing:-2px;
color:#0066CC;
}

.subtitle{
margin-top:12px;
color:#666;
font-size:18px;
}

.search{
margin:40px auto;
max-width:700px;
}

.search input{
width:100%;
padding:18px 24px;
border:1px solid var(--border);
border-radius:16px;
background:white;
font-size:16px;
outline:none;
}

.search input:focus{
border-color:var(--accent);
}

.panel{
background:white;
padding:30px;
border-radius:24px;
margin-bottom:40px;
}

.panel h2{
margin-bottom:20px;
font-family:'Hanken Grotesk';
}

.form{
display:grid;
grid-template-columns:1fr 1fr 1fr auto;
gap:12px;
}

.form input,
.form select{
padding:14px;
border:1px solid var(--border);
border-radius:12px;
font-size:15px;
}

.form button{
border:none;
padding:14px 24px;
background:var(--accent);
color:white;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.category{
margin-bottom:50px;
}

.category-title{
font-family:'Hanken Grotesk';
font-size:28px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:22px;
border-radius:24px;
transition:.3s;
position:relative;
}

.card:hover{
transform:translateY(-4px);
}

.card h3{
margin-bottom:10px;
}

.card a{
color:var(--accent);
text-decoration:none;
font-weight:600;
}

.delete{
position:absolute;
top:15px;
right:15px;
border:none;
background:#f3f3f5;
padding:8px 10px;
border-radius:999px;
cursor:pointer;
}

footer{
text-align:center;
padding:40px;
color:#777;
}

@media(max-width:768px){

h1{
font-size:40px;
}

.form{
grid-template-columns:1fr;
}

}

.dark{
    --bg:#0f0f10;
    --card:#1c1c1e;
    --text:#ffffff;
    --accent:#0A84FF;
    --border:#333;
}

#themeBtn{
    margin-top:20px;
    border:none;
    padding:12px 20px;
    border-radius:12px;
    background:var(--accent);
    color:white;
    cursor:pointer;
    font-weight:600;
}

.search input{
    background:var(--card);
    color:var(--text);
}

.panel{
    background:var(--card);
}

.card{
background:var(--card);
padding:22px;
border-radius:24px;
transition:.3s;
position:relative;

display:flex;
flex-direction:column;
align-items:center;
text-align:center;
gap:10px;
}

.favicon{
    width:48px;
    height:48px;
    display:block;
    margin:0 auto 15px;
    border-radius:12px;
}

.form input,
.form select{
    background:var(--card);
    color:var(--text);
}

</style>

</head>

<body>

<div class="container">

<header>
<h1>DARKFLIX</h1>
<p class="subtitle">Movies • Anime • Gaming • Tools</p>

<button id="themeBtn">
🌙 Dark Mode
</button>
</header>

<div class="search">
<input id="search" placeholder="Search links...">
</div>

<div class="panel">

<h2>Add New Link</h2>

<div class="form">

<input id="name" placeholder="Website Name">

<input id="url" placeholder="https://example.com">

<select id="category">
<option>Movies</option>
<option>Anime</option>
<option>Gaming</option>
<option>Tools</option>
<option>Social</option>
</select>

<button onclick="addLink()">Add</button>

</div>

</div>

<div id="content"></div>

<footer>
© DARKFLIX Hub
</footer>

</div>

<script>

// DARK MODE

const themeBtn =
document.getElementById("themeBtn");

if(localStorage.getItem("theme")==="dark"){

    document.body.classList.add("dark");

    themeBtn.textContent =
    "☀️ Light Mode";
}

themeBtn.addEventListener("click",()=>{

    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){

        themeBtn.textContent =
        "☀️ Light Mode";

        localStorage.setItem(
            "theme",
            "dark"
        );

    }else{

        themeBtn.textContent =
        "🌙 Dark Mode";

        localStorage.setItem(
            "theme",
            "light"
        );
    }
});

// LINK SYSTEM

let links = JSON.parse(
localStorage.getItem("darkflix_links")
) || [

{
name:"GitHub",
url:"https://github.com",
category:"Tools"
},

{
name:"Canva",
url:"https://canva.com",
category:"Tools"
}

];

function save(){
localStorage.setItem(
"darkflix_links",
JSON.stringify(links)
);
}

function render(){

const content =
document.getElementById("content");

content.innerHTML="";

const search =
document.getElementById("search")
.value
.toLowerCase();

const categories =
["Movies","Anime","Gaming","Tools","Social"];

categories.forEach(cat=>{

const filtered =
links.filter(link=>

link.category===cat &&
link.name.toLowerCase().includes(search)

);

if(filtered.length===0) return;

const section =
document.createElement("div");

section.className="category";

section.innerHTML =
`
<h2 class="category-title">${cat}</h2>

<div class="grid">

${filtered.map((item,index)=>`

<div class="card">

<button class="delete"
onclick="removeLink(${links.indexOf(item)})">
✕
</button>

<img
class="favicon"
src="https://www.google.com/s2/favicons?domain=${new URL(item.url).hostname}&sz=128"
alt="${item.name}"
>

<h3>${item.name}</h3>

<a href="${item.url}"
target="_blank">
Open Website
</a>

</div>

`).join("")}

</div>
`;
content.appendChild(section);

});

}

function addLink(){

const name =
document.getElementById("name").value;

const url =
document.getElementById("url").value;

const category =
document.getElementById("category").value;

if(!name || !url) return;

links.push({
name,
url,
category
});

save();
render();

document.getElementById("name").value="";
document.getElementById("url").value="";
}

function removeLink(index){

links.splice(index,1);

save();
render();

}

document
.getElementById("search")
.addEventListener("input",render);

render();

</script>

</body>
</html>
